<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elian Maths | PCSI Prestige Edition</title>
    
    <script>
        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$'], ['\\(', '\\)']], 
                displayMath: [['$$', '$$']],
                processEscapes: true
            },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy-dark: #0a0f1d;     
            --navy-main: #111827;     
            --gold-btn: #eab308;      
            --gold-hover: #facc15;    
            --gold-muted: #c6a052;    
            --bg-page: #f8fafc;        
            --surface: #ffffff;        
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Couleurs pour QCM */
            --selected-bg: #ebf8ff;
            --selected-border: #3b82f6;
            --correct-bg: #ecfdf5;
            --correct-border: #10b981;
            --wrong-bg: #fef2f2;
            --wrong-border: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: var(--bg-page); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR PRESTIGE --- */
        #sidebar { 
            width: 320px; 
            min-width: 320px;
            height: 100vh; 
            background: var(--surface); 
            border-right: 1px solid var(--border); 
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: var(--transition);
        }

        .logo-area { 
            padding: 40px 25px; 
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .logo-box {
            background: var(--navy-dark);
            padding: 15px 20px;
            border-radius: 14px;
            display: inline-block;
            border: 1px solid rgba(234, 179, 8, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .logo-text { color: #fff; font-weight: 800; font-size: 1.4rem; margin: 0; letter-spacing: -1px; }
        .logo-text span { color: var(--gold-btn); }

        .badge-pcsi {
            display: inline-block; margin-top: 15px; padding: 6px 14px;
            background: linear-gradient(135deg, var(--gold-btn), var(--gold-hover));
            color: var(--navy-dark); font-size: 0.7rem; font-weight: 800;
            border-radius: 50px; text-transform: uppercase; letter-spacing: 1px;
        }

        #nav-scroll { flex-grow: 1; overflow-y: auto; padding: 20px 0; }

        /* --- ACCORDEON --- */
        .chap-group { margin-bottom: 5px; }
        .chap-toggle {
            width: 100%; padding: 16px 25px; background: none; border: none;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; font-weight: 700; font-size: 0.85rem; color: var(--navy-dark);
            text-transform: uppercase; transition: var(--transition);
        }
        .chap-toggle:hover { background: #f1f5f9; }
        .chap-toggle i.main-icon { width: 25px; color: var(--gold-muted); }
        .chap-content { display: none; background: #fafbfc; border-bottom: 1px solid var(--border); }
        .chap-content.active { display: block; }
        .nav-section-title { padding: 15px 30px 5px; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .nav-link {
            display: flex; align-items: center; padding: 12px 30px 12px 45px;
            color: var(--text-muted); text-decoration: none; font-size: 0.9rem;
            font-weight: 500; cursor: pointer; transition: var(--transition);
        }
        .nav-link:hover { color: var(--navy-dark); background: #fff; padding-left: 50px; box-shadow: inset 4px 0 0 var(--gold-btn); }
        .nav-link i { margin-right: 12px; font-size: 0.85rem; width: 18px; text-align: center; }

        /* --- MAIN AREA --- */
        #main-wrapper { flex-grow: 1; height: 100vh; overflow-y: auto; position: relative; background: var(--bg-page); scroll-behavior: smooth; }
        #content-container { max-width: 1000px; margin: 0 auto; padding: 40px 20px 120px; }

        .hero-banner {
            background: linear-gradient(145deg, var(--navy-dark), var(--navy-main));
            border-radius: var(--radius); padding: 60px 40px; color: white; margin-bottom: 40px;
            border-bottom: 5px solid var(--gold-btn); box-shadow: var(--shadow-md);
        }
        .hero-banner h1 { margin: 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
        .hero-banner p { opacity: 0.8; margin-top: 10px; font-size: 1.1rem; }

        /* --- DESIGN QCM UNIFIÉ --- */
        .qcm-box {
            background: var(--surface); border-radius: var(--radius); padding: 35px;
            margin-bottom: 25px; box-shadow: var(--shadow-sm); border: 1px solid var(--border);
            transition: var(--transition);
        }
        .qcm-box:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .qcm-question { font-size: 1.15rem; font-weight: 700; margin-bottom: 25px; line-height: 1.5; color: var(--navy-dark); }
        .qcm-grid { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
        @media (max-width: 768px) { .qcm-grid { grid-template-columns: 1fr; } }

        .opt-btn {
            padding: 16px 22px; border-radius: 12px; border: 2px solid var(--border);
            background: white; cursor: pointer; text-align: left; font-family: inherit;
            font-size: 1rem; font-weight: 500; color: var(--text-main); transition: all 0.2s ease;
            display: flex; align-items: center;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--gold-muted); background: #fffdf5; }
        
        /* États de sélection et correction */
        .opt-btn.selected { background: var(--selected-bg); border-color: var(--selected-border); font-weight: 700; color: var(--navy-dark); }
        .opt-btn.correct-reveal { background: var(--correct-bg) !important; border-color: var(--correct-border) !important; color: #065f46 !important; font-weight: 700; }
        .opt-btn.wrong-reveal { background: var(--wrong-bg) !important; border-color: var(--wrong-border) !important; color: #991b1b !important; opacity: 0.8; }
        .opt-btn:disabled { cursor: default; }

        /* Boutons de soumission */
        .quiz-footer { margin-top: 40px; padding: 30px; border-top: 2px dashed var(--border); background: var(--surface); border-radius: var(--radius); text-align: center; }
        .btn-primary {
            background-color: var(--navy-dark); color: white; border: none; padding: 15px 30px;
            font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit;
            display: inline-flex; align-items: center; gap: 10px; transition: var(--transition);
        }
        .btn-primary:hover:not(:disabled) { background-color: var(--gold-btn); color: var(--navy-dark); transform: translateY(-2px); }
        .btn-primary:disabled { background-color: var(--text-muted); cursor: not-allowed; opacity: 0.7; }

        /* Score & Feedback */
        #score-display { display: none; margin-top: 25px; font-size: 1.8rem; font-weight: 800; color: var(--navy-dark); }
        #score-display span { color: var(--gold-btn); font-size: 2.2rem; }
        #congrats-msg { display: none; margin-top: 15px; padding: 15px 25px; border-radius: 8px; font-weight: 600; }

        .share-bar { margin-top: 30px; background: var(--navy-dark); padding: 25px; border-radius: var(--radius); display: flex; justify-content: space-between; align-items: center; color: white; flex-wrap: wrap; gap: 15px;}
        .share-btn { padding: 12px 24px; border-radius: 50px; border: none; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 10px; transition: var(--transition); }
        .btn-pdf { background: white; color: var(--navy-dark); }
        .btn-wa { background: #25D366; color: white; }
        .share-btn:hover { transform: scale(1.05); }

        /* --- MOBILE --- */
        .menu-trigger { display: none; position: fixed; top: 20px; left: 20px; z-index: 2000; background: var(--navy-dark); color: var(--gold-btn); border: none; width: 50px; height: 50px; border-radius: 12px; font-size: 1.5rem; }
        @media (max-width: 1000px) {
            #sidebar { position: fixed; left: -320px; }
            #sidebar.open { left: 0; }
            .menu-trigger { display: block; }
            #main-wrapper { margin-left: 0; padding-top: 60px; }
        }
    </style>
</head>
<body>

    <button class="menu-trigger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <div id="sidebar">
        <div class="logo-area">
            <div class="logo-box"><p class="logo-text">ELIAN<span>MATHS</span></p></div><br>
            <span class="badge-pcsi">Prestige Edition PCSI</span>
        </div>

        <div id="nav-scroll">
            <div class="chap-group">
                <button class="chap-toggle" onclick="toggleAccordeon(this)">
                    <span><i class="fas fa-square-root-variable main-icon"></i> Polynômes</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="chap-content">
                    <p class="nav-section-title">Entraînement</p>
                    <a class="nav-link" style="color:#059669; font-weight:700" onclick="loadTraining('poly')"><i class="fas fa-bolt"></i> Test Aléatoire (v1 à v4)</a>
                </div>
            </div>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="content-container">
            <div class="hero-banner">
                <h1>Bienvenue, Elian</h1>
                <p>Préparez vos concours avec rigueur. Sélectionnez un module dans le menu latéral pour commencer.</p>
            </div>
        </div>
    </div>

    <script>
        // UI Menu
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleAccordeon(btn) {
            const content = btn.nextElementSibling;
            const icon = btn.querySelector('.fa-chevron-down');
            document.querySelectorAll('.chap-content').forEach(el => { if(el !== content) el.classList.remove('active'); });
            const isActive = content.classList.toggle('active');
            icon.style.transform = isActive ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        // Chargement de page (AJAX)
        async function loadPage(fileName) {
            if(window.innerWidth < 1000) document.getElementById('sidebar').classList.remove('open');
            const container = document.getElementById('content-container');
            container.innerHTML = '<div style="text-align:center; padding:100px;"><i class="fas fa-circle-notch fa-spin" style="font-size:3rem; color:var(--gold-btn)"></i></div>';

            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`content/${fileName}.html?v=${timestamp}`);
                if(!response.ok) throw new Error("Fichier introuvable");
                
                const html = await response.text();
                container.innerHTML = html;

                if(window.MathJax) MathJax.typesetPromise([container]).catch(err => console.log(err));
                document.getElementById('main-wrapper').scrollTop = 0;
            } catch (error) {
                container.innerHTML = `<div class="hero-banner" style="background:#ef4444; border-color:#991b1b"><h1>Erreur 404</h1><p>Le module <b>content/${fileName}.html</b> est introuvable.</p></div>`;
            }
        }

        // Tirage au sort incluant v4
        let currentTotalQuestions = 0; // Va stocker le nombre de questions chargées

        function loadTraining(subject) {
            const versions = ['v1', 'v2', 'v3', 'v4']; // v4 (Pro) est bien inclus ici !
            const randomVersion = versions[Math.floor(Math.random() * versions.length)];
            const finalName = `${subject}_training_${randomVersion}`;
            
            // On charge la page, et une fois chargée on compte les questions
            loadPage(finalName).then(() => {
                setTimeout(() => {
                    currentTotalQuestions = document.querySelectorAll('.qcm-grid').length;
                }, 500); // Petit délai pour laisser le DOM s'insérer
            });
        }

        // Moteur QCM Unifié
        function selectAnswer(btn, isCorrect) {
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn && submitBtn.disabled) return; // Bloqué si déjà soumis

            const grid = btn.closest('.qcm-grid');
            if (!grid) return;

            const buttons = grid.querySelectorAll('.opt-btn');
            buttons.forEach(b => b.classList.remove('selected'));
            
            btn.classList.add('selected');
            grid.dataset.answered = "true";
            grid.dataset.isCorrect = isCorrect;
        }

        function calculateScore() {
            const grids = document.querySelectorAll('.qcm-grid');
            let score = 0;
            let answeredQuestions = 0;

            grids.forEach(grid => {
                if (grid.dataset.answered === "true") answeredQuestions++;
            });

            if (answeredQuestions < currentTotalQuestions) {
                const confirmSubmit = confirm(`Vous n'avez répondu qu'à ${answeredQuestions} question(s) sur ${currentTotalQuestions}. Voulez-vous vraiment soumettre ?`);
                if (!confirmSubmit) return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-lock"></i> Examen terminé';

            // Correction visuelle
            grids.forEach(grid => {
                const buttons = grid.querySelectorAll('.opt-btn');
                if (grid.dataset.isCorrect === "true") score++;

                buttons.forEach(btn => {
                    btn.disabled = true;
                    if (btn.getAttribute('onclick').includes('true')) {
                        btn.classList.add('correct-reveal');
                    } else if (btn.classList.contains('selected')) {
                        btn.classList.add('wrong-reveal');
                    }
                });
            });

            // Affichage du score
            const scoreDisplay = document.getElementById('score-display');
            const scoreValue = document.getElementById('score-value');
            const maxScoreDisplay = document.getElementById('max-score');
            const congratsMsg = document.getElementById('congrats-msg');
            const shareBlock = document.getElementById('share-block');

            scoreValue.textContent = score;
            maxScoreDisplay.textContent = currentTotalQuestions;
            scoreDisplay.style.display = 'block';
            congratsMsg.style.display = 'inline-block';
            shareBlock.style.display = 'flex';

            const ratio = score / currentTotalQuestions;
            if (ratio === 1) {
                congratsMsg.style.backgroundColor = "#d1fae5"; congratsMsg.style.color = "#065f46";
                congratsMsg.innerHTML = "🏆 Perfection ! Esprit PCSI au top.";
            } else if (ratio >= 0.7) {
                congratsMsg.style.backgroundColor = "#dbeafe"; congratsMsg.style.color = "#1e3a8a";
                congratsMsg.innerHTML = "👏 Très bon travail, bases solides.";
            } else {
                congratsMsg.style.backgroundColor = "#fee2e2"; congratsMsg.style.color = "#991b1b";
                congratsMsg.innerHTML = "💪 Des révisions s'imposent, ne lâche rien !";
            }
            
            setTimeout(() => { document.querySelector('.quiz-footer').scrollIntoView({ behavior: 'smooth' }); }, 100);
        }

        function generatePDF() { html2pdf().set({ margin: 10, filename: 'Resultats.pdf' }).from(document.getElementById('content-container')).save(); }
        function shareWA() { window.open(`https://wa.me/?text=${encodeURIComponent("J'ai terminé ma session sur Elian Maths !")}`); }
    </script>
</body>
</html>
