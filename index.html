<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elian Maths | Édition Prépa</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']], processEscapes: true },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --v-blue: #3A9AD9; --v-green: #B8D433; --v-red: #D34537;
            --v-yellow: #F6C831; --bg-app: #f4f7f6; --bg-card: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b;
            --header-height: 75px; --dock-height: 75px;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.04);
            --radius-xl: 28px; --radius-lg: 20px; --radius-md: 14px;
            --glass-bg: rgba(255, 255, 255, 0.85); --glass-blur: blur(16px);
            --transition-bouncy: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0;
            background-color: var(--bg-app); height: 100%; width: 100%;
            overflow: hidden; color: var(--text-main);
        }

        .app-background {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
            background: linear-gradient(180deg, rgba(58,154,217,0.08) 0%, rgba(244,247,246,1) 30%, rgba(184,212,51,0.05) 100%);
        }

        /* --- HEADER --- */
        header {
            position: absolute; top: 0; left: 0; right: 0; height: var(--header-height);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100; background: var(--v-blue); color: white;
            box-shadow: 0 4px 15px rgba(58, 154, 217, 0.3);
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-icon { background: white; color: var(--v-blue); width: 40px; height: 40px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
        .logo-text { font-weight: 900; font-size: 1.3rem; margin: 0; letter-spacing: -0.5px;}
        .logo-text span { color: var(--v-yellow); }

        /* --- MAIN CONTENT --- */
        main {
            position: absolute; top: var(--header-height); bottom: 0; left: 0; right: 0;
            overflow-y: auto; -webkit-overflow-scrolling: touch; 
            padding: 20px 20px calc(var(--dock-height) + var(--safe-bottom) + 30px) 20px;
        }
        .content-container { max-width: 800px; margin: 0 auto; width: 100%; }

        /* --- DOCK --- */
        nav.floating-dock {
            position: fixed; bottom: calc(var(--safe-bottom) + 15px); left: 50%; transform: translateX(-50%);
            width: calc(100% - 20px); max-width: 600px; height: var(--dock-height);
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255,255,255,0.5); border-radius: var(--radius-xl);
            display: grid; grid-template-columns: repeat(5, 1fr); box-shadow: 0 15px 35px rgba(0,0,0,0.1); z-index: 1000; padding: 5px;
        }
        .dock-item { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--radius-lg); color: var(--text-muted); cursor: pointer; transition: var(--transition-bouncy); gap: 4px; }
        .dock-item.active { background: var(--v-blue); color: white; box-shadow: 0 8px 20px rgba(58, 154, 217, 0.4); transform: translateY(-5px); }
        .dock-item span { font-size: 0.60rem; font-weight: 700; text-transform: uppercase; }

        /* --- HERO & DASHBOARD --- */
        .hero-banner {
            background: var(--v-blue); border-radius: var(--radius-xl); padding: 30px 25px; margin-bottom: 25px;
            color: white; text-align: center; position: relative; overflow: hidden; box-shadow: 0 15px 30px rgba(58, 154, 217, 0.2);
        }
        .hero-banner h1 { margin: 0; font-size: 3rem; font-weight: 900; line-height: 1; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .action-card {
            background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px 15px;
            text-align: center; box-shadow: var(--shadow-soft); transition: var(--transition-bouncy);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer;
        }
        .ac-icon { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        /* --- CHAPTER PANEL --- */
        #chapter-panel {
            position: fixed; top: 0; left: -100%; width: 85vw; max-width: 380px; height: 100%;
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); z-index: 2000; transition: left 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 20px 0 50px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        }
        #chapter-panel.open { left: 0; }
        .cp-header { background: var(--v-blue); color: white; padding: 40px 25px 25px; display: flex; justify-content: space-between; align-items: center; }
        .chap-group { margin: 10px 20px; background: white; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-soft); }
        .chap-toggle { width: 100%; padding: 18px; border: none; background: transparent; display: flex; justify-content: space-between; font-weight: 800; cursor: pointer; }
        .chap-content { display: none; padding: 10px; background: #fafafa; }
        .chap-content.active { display: block; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 12px; text-decoration: none; color: var(--text-muted); font-weight: 600; cursor: pointer; border-radius: 10px; }

        /* --- QCM --- */
        .qcm-card { background: white; border-radius: var(--radius-xl); padding: 25px; margin-bottom: 20px; border-top: 6px solid var(--v-blue); box-shadow: var(--shadow-soft); }
        .opt-btn { width: 100%; padding: 16px; margin-top: 10px; border-radius: var(--radius-md); border: 2px solid #e2e8f0; background: white; font-weight: 600; text-align: left; cursor: pointer; transition: 0.2s; }
        .opt-btn.correct { background: var(--v-green) !important; color: #3d4a0a; border-color: var(--v-green); }
        .opt-btn.wrong { background: var(--v-red) !important; color: white; border-color: var(--v-red); }
        .correction-box { margin-top: 15px; padding: 15px; background: #f8fafc; border-left: 4px solid var(--v-yellow); display: none; }

        /* --- MODALS --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 3000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .overlay.show { opacity: 1; }
        .timer-circle { width: 180px; height: 180px; border-radius: 50%; border: 8px solid #f1f5f9; margin: 20px auto; display: flex; justify-content: center; align-items: center; font-size: 3rem; font-weight: 900; }
    </style>
</head>
<body>

    <div class="app-background"></div>

    <header>
        <div class="logo-area" onclick="navigateHome(document.querySelector('.dock-item'))">
            <div class="logo-icon"><i class="fas fa-square-root-variable"></i></div>
            <p class="logo-text">ELIAN<span>MATHS</span></p>
        </div>
        <div class="header-actions">
            <button onclick="location.reload()" style="background:rgba(255,255,255,0.2); border:none; color:white; width:40px; height:40px; border-radius:12px;"><i class="fas fa-rotate"></i></button>
        </div>
    </header>

    <aside id="chapter-panel">
        <div class="cp-header">
            <h2>Programme</h2>
            <button onclick="closeChapterPanel()" style="background:none; border:none; color:white; font-size:1.5rem;"><i class="fas fa-times"></i></button>
        </div>
        <div style="overflow-y:auto; padding-bottom: 20px;">
            <div class="chap-group">
                <button class="chap-toggle" onclick="toggleAccordeon(this)">Dénombrement <i class="fas fa-chevron-down"></i></button>
                <div class="chap-content">
                    <a class="nav-link" onclick="loadPage('denom_ensembles')"><i class="fas fa-book"></i> Cours</a>
                    <a class="nav-link" onclick="loadTraining('denom')" style="color:var(--v-green)"><i class="fas fa-bolt"></i> Test Niveau</a>
                </div>
            </div>
            <div class="chap-group">
                <button class="chap-toggle" onclick="toggleAccordeon(this)">Polynômes <i class="fas fa-chevron-down"></i></button>
                <div class="chap-content">
                    <a class="nav-link" onclick="loadPage('poly_bases')"><i class="fas fa-book"></i> Cours</a>
                    <a class="nav-link" onclick="loadTraining('poly')" style="color:var(--v-green)"><i class="fas fa-bolt"></i> Test Niveau</a>
                </div>
            </div>
        </div>
    </aside>

    <main id="main-wrapper">
        <div class="content-container">
            <div id="home-view">
                <div class="hero-banner">
                    <h1>Maths PCSI</h1>
                    <p>Réussir en classe préparatoire</p>
                </div>
                <div class="dashboard-grid">
                    <div class="action-card" onclick="openPomodoroModal()" style="border-bottom:4px solid var(--v-red)">
                        <div class="ac-icon" style="color:var(--v-red)"><i class="fas fa-stopwatch"></i></div>
                        <span style="font-weight:800">Mode Focus</span>
                    </div>
                    <div class="action-card" style="border-bottom:4px solid var(--v-blue)">
                        <div class="ac-icon" style="color:var(--v-blue)"><i class="fas fa-clock"></i></div>
                        <span id="clock-display" style="font-weight:800">--:--</span>
                    </div>
                </div>
            </div>
            <div id="module-view" style="display:none;"></div>
        </div>
    </main>

    <nav class="floating-dock">
        <div class="dock-item active" onclick="navigateHome(this)"><i class="fas fa-house"></i><span>Accueil</span></div>
        <div class="dock-item" onclick="navigateChapter('dénombrement', this)"><i class="fas fa-layer-group"></i><span>Dénombr.</span></div>
        <div class="dock-item" onclick="navigateChapter('polynômes', this)"><i class="fas fa-square-root-variable"></i><span>Polyn.</span></div>
        <div class="dock-item" onclick="navigateChapter('géométrie', this)"><i class="fas fa-draw-polygon"></i><span>Géom.</span></div>
        <div class="dock-item" onclick="navigateChapter('fonctions', this)"><i class="fas fa-chart-line"></i><span>Fonct.</span></div>
    </nav>

    <div class="overlay" id="overlay-pomo">
        <div style="background:white; width:90%; max-width:400px; border-radius:var(--radius-xl); padding:20px; text-align:center;">
            <h3 style="margin:0; color:var(--v-red)">Focus Session</h3>
            <div class="timer-circle" id="timer-display">25:00</div>
            <div style="display:flex; justify-content:center; gap:10px; padding-bottom: 10px;">
                <button onclick="startPomodoro()" style="background:var(--v-green); border:none; padding:12px 25px; border-radius:50px; font-weight:800; color:white;">Start</button>
                <button onclick="pausePomodoro()" style="background:var(--v-yellow); border:none; padding:12px 25px; border-radius:50px; font-weight:800;">Pause</button>
                <button onclick="closeModal('overlay-pomo')" style="background:#eee; border:none; padding:12px 25px; border-radius:50px;">Fermer</button>
            </div>
        </div>
    </div>

    <script>
        const mainWrapper = document.getElementById('main-wrapper');
        const homeView = document.getElementById('home-view');
        const moduleView = document.getElementById('module-view');
        const chapterPanel = document.getElementById('chapter-panel');

        // Horloge
        setInterval(() => {
            const d = document.getElementById('clock-display');
            if (d) d.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        // Navigation
        function navigateHome(element) {
            document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
            element.classList.add('active');
            closeChapterPanel();
            moduleView.style.display = 'none';
            homeView.style.display = 'block';
        }

        function navigateChapter(name, element) {
            document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
            element.classList.add('active');
            chapterPanel.classList.add('open');
        }

        function closeChapterPanel() { chapterPanel.classList.remove('open'); }

        function toggleAccordeon(btn) {
            btn.nextElementSibling.classList.toggle('active');
            btn.classList.toggle('active');
        }

        // Chargement pages
        async function loadPage(fileName) {
            closeChapterPanel();
            homeView.style.display = 'none';
            moduleView.style.display = 'block';
            moduleView.innerHTML = '<div style="text-align:center; padding:50px;"><i class="fas fa-spinner fa-spin"></i></div>';
            
            try {
                const response = await fetch(`content/${fileName}.html?v=${Date.now()}`);
                if(!response.ok) throw new Error();
                moduleView.innerHTML = await response.text();
                if(window.MathJax) MathJax.typesetPromise([moduleView]);
                window.currentScore = 0;
                window.totalQuestions = moduleView.querySelectorAll('.qcm-card').length;
            } catch (e) {
                moduleView.innerHTML = '<div class="qcm-card">Module non trouvé.</div>';
            }
        }

        function loadTraining(subject) { loadPage(`${subject}_training_1`); }

        // Moteur QCM
        window.checkQCM = function(btn, isCorrect) {
            const card = btn.closest('.qcm-card');
            if(card.classList.contains('answered')) return;
            card.classList.add('answered');
            card.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
            
            if(isCorrect) {
                btn.classList.add('correct');
                window.currentScore++;
            } else {
                btn.classList.add('wrong');
                card.querySelectorAll('.opt-btn').forEach(b => {
                    if(b.getAttribute('onclick').includes('true')) b.classList.add('correct');
                });
            }
            const feedback = card.querySelector('.correction-box');
            if(feedback) feedback.style.display = 'block';
        };

        // Pomodoro
        let pomoInterval; let timeLeft = 1500;
        function updateDisplayPomo() {
            const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
            document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }
        function startPomodoro() { 
            if(!pomoInterval) pomoInterval = setInterval(() => { 
                if(timeLeft>0) { timeLeft--; updateDisplayPomo(); } 
                else { clearInterval(pomoInterval); alert('Session terminée !'); } 
            }, 1000); 
        }
        function pausePomodoro() { clearInterval(pomoInterval); pomoInterval = null; }
        function openPomodoroModal() { 
            const el = document.getElementById('overlay-pomo');
            el.style.display = 'flex';
            setTimeout(() => el.classList.add('show'), 10);
        }
        function closeModal(id) { 
            const el = document.getElementById(id);
            el.classList.remove('show');
            setTimeout(() => el.style.display = 'none', 300);
        }
    </script>
</body>
</html>
