<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elian Maths | PCSI Prestige Edition</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy-dark: #0a0f1d;     
            --navy-main: #111827;     
            --gold-btn: #eab308;      
            --gold-hover: #facc15;    
            --gold-muted: #c6a052;    
            --bg-page: #f4f6f9;        
            --surface: #ffffff;        
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 14px;
            --shadow-sm: 0 2px 10px rgba(10, 15, 29, 0.03);
            --shadow-md: 0 10px 25px rgba(10, 15, 29, 0.08);
            --shadow-lg: 0 20px 40px rgba(10, 15, 29, 0.15);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-page); color: var(--text-main); display: flex; overflow: hidden; height: 100vh; }
        
        /* SIDEBAR */
        #sidebar { 
            width: 320px; height: 100vh; background: var(--surface); 
            border-right: 1px solid var(--border); overflow-y: auto; position: fixed; z-index: 100;
            box-shadow: 4px 0 15px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
        }

        .logo-container { padding: 40px 20px 30px; text-align: center; border-bottom: 1px solid var(--border); background: var(--surface); }
        .logo-box {
            background: var(--navy-dark);
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(234, 179, 8, 0.4);
        }
        .logo-text { font-weight: 800; font-size: 1.4rem; color: #fff; letter-spacing: -1px; margin: 0; }
        .logo-text span { color: var(--gold-btn); }
        
        .badge-prestige {
            font-size: 0.65rem; color: var(--navy-dark); font-weight: 800; margin-top: 12px; 
            background: linear-gradient(135deg, var(--gold-btn), var(--gold-hover));
            display: inline-block; padding: 5px 12px; border-radius: 50px; box-shadow: 0 2px 5px rgba(234, 179, 8, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* MENU ARCHITECTURE */
        .chapter-box { border-bottom: 1px solid var(--border); }
        .lvl-1-btn { 
            width: 100%; padding: 18px 20px; border: none; background: none;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 800; color: var(--navy-dark); cursor: pointer; transition: var(--transition);
            text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px;
        }
        .lvl-1-btn:hover { background: #f8fafc; color: var(--gold-muted); }

        .lvl-2-container { display: none; background: #fafbfc; padding-bottom: 10px; border-top: 1px solid #f1f5f9; }
        .lvl-2-container.open { display: block; }

        .lvl-2-header { 
            padding: 15px 20px 5px 30px; font-size: 0.7rem; font-weight: 800; 
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
        }

        .lvl-3-item {
            display: flex; align-items: center; padding: 10px 20px 10px 45px; 
            font-size: 0.9rem; color: var(--text-muted); font-weight: 500; text-decoration: none; 
            transition: var(--transition); cursor: pointer;
        }
        .lvl-3-item i { margin-right: 12px; font-size: 0.85rem; width: 15px; text-align: center; }
        .lvl-3-item:hover { color: var(--navy-dark); background: white; padding-left: 50px; box-shadow: inset 3px 0 0 var(--gold-btn); }
        .lvl-3-item.training { color: #059669; font-weight: 600; }
        
        .chevron { font-size: 0.7rem; transition: transform 0.3s; color: var(--text-muted); }
        .open > .chevron { transform: rotate(180deg); color: var(--navy-dark); }

        /* MAIN CONTENT */
        #main { 
            margin-left: 320px; flex-grow: 1; padding: 40px; padding-bottom: 120px; 
            height: 100vh; overflow-y: auto; scroll-behavior: smooth; box-sizing: border-box; 
        }
        
        .banner { 
            background: linear-gradient(135deg, var(--navy-dark), var(--navy-main)); 
            color: white; padding: 50px; border-radius: var(--radius); margin-bottom: 40px;
            box-shadow: var(--shadow-md); position: relative; overflow: hidden;
            border-bottom: 4px solid var(--gold-btn);
        }

        /* ACTIONS DE PARTAGE DANS LE SCORE */
        .share-grid-score { 
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px;
        }
        
        .share-pill {
            padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: white; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .share-pill:hover { background: var(--gold-btn); color: var(--navy-dark); border-color: var(--gold-btn); transform: scale(1.05); }
        .share-pill.whatsapp:hover { background: #25D366; border-color: #25D366; color: white; }

        /* QCM BOX */
        .qcm-box { 
            background: var(--surface); padding: 35px; border-radius: var(--radius); 
            margin-bottom: 30px; border-left: 8px solid var(--gold-muted); box-shadow: var(--shadow-sm); 
        }
        .opt-btn {
            display: block; width: 100%; text-align: left; padding: 15px 20px;
            margin: 10px 0; border: 1px solid var(--border); border-radius: 10px;
            background: #fff; cursor: pointer; transition: 0.2s; font-size: 0.95rem;
        }
        .opt-btn.correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; font-weight: 600; }
        .opt-btn.wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            #sidebar { transform: translateX(-100%); }
            #sidebar.active { transform: translateX(0); }
            #main { margin-left: 0; padding: 80px 15px 100px 15px; }
            .mobile-menu-btn { display: block; }
        }

        .mobile-menu-btn {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: var(--navy-dark); color: var(--gold-btn); border: none;
            border-radius: 8px; padding: 12px 18px; font-size: 1.2rem; cursor: pointer;
        }
        
        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 95;
        }
        .sidebar-overlay.active { display: block; }
    </style>
</head>
<body>

<button class="mobile-menu-btn" onclick="toggleMobileMenu()">
    <i class="fas fa-bars"></i>
</button>

<div class="sidebar-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>

<div id="sidebar">
    <div class="logo-container">
        <div class="logo-box">
            <div class="logo-text">ELIAN<span>MATHS</span></div>
        </div>
        <br>
        <div class="badge-prestige">PREPA PCSI PRESTIGE</div>
    </div>

    <nav id="menu">
        <div class="chapter-box">
            <button class="lvl-1-btn" onclick="toggleMenu(this)">
                <span><i class="fas fa-superscript"></i> &nbsp; Polynômes</span>
                <i class="fas fa-chevron-down chevron"></i>
            </button>
            <div class="lvl-2-container">
                <div class="lvl-2-header">Cours & Méthodes</div>
                <a class="lvl-3-item" onclick="load('poly_racines')"><i class="fas fa-seedling"></i> Racines & Multiplicité</a>
                <a class="lvl-3-item" onclick="load('poly_fractions')"><i class="fas fa-divide"></i> Fractions Rationnelles</a>
                <div class="lvl-2-header">Pratique</div>
                <a class="lvl-3-item" onclick="load('poly_exos')"><i class="fas fa-pen-to-square"></i> Série Intensive</a>
                <a class="lvl-3-item training" onclick="loadTraining('poly')"><i class="fas fa-bolt"></i> Test d'entraînement</a>
            </div>
        </div>

        <div class="chapter-box">
            <button class="lvl-1-btn" onclick="toggleMenu(this)">
                <span><i class="fas fa-draw-polygon"></i> &nbsp; Géométrie</span>
                <i class="fas fa-chevron-down chevron"></i>
            </button>
            <div class="lvl-2-container">
                <a class="lvl-3-item" onclick="load('geo_metrique')"><i class="fas fa-vector-square"></i> Produit Scalaire</a>
                <a class="lvl-3-item training" onclick="loadTraining('geo')"><i class="fas fa-bolt"></i> Test d'entraînement</a>
            </div>
        </div>
    </nav>
</div>

<div id="main">
    <div id="dynamic-content">
        <div class="banner">
            <h1 style="font-size: 2.5rem; margin: 0; letter-spacing: -1px;">Espace de Travail</h1>
            <p style="opacity: 0.9; font-size: 1.1rem; margin-top: 10px;">Votre plateforme de révision PCSI Haute Performance.</p>
        </div>
        
        <div style="text-align:center; padding: 50px; color: var(--text-muted);">
            <i class="fas fa-arrow-left" style="font-size: 2rem; margin-bottom: 20px;"></i>
            <h3>Sélectionnez un module dans le menu.</h3>
        </div>
    </div>
</div>

<script>
    function toggleMobileMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('mobileOverlay').classList.toggle('active');
    }

    function toggleMenu(btn) {
        const container = btn.nextElementSibling;
        btn.classList.toggle('open');
        container.classList.toggle('open');
    }

    // --- CHARGEMENT DEPUIS LE DOSSIER CONTENT ---
    async function load(file) {
        if (window.innerWidth <= 900) toggleMobileMenu();
        const target = document.getElementById('dynamic-content');
        
        try {
            // Chemin mis à jour vers le dossier 'content'
            const response = await fetch(`content/${file}.html`);
            if (!response.ok) throw new Error('Fichier absent');
            
            const html = await response.text();
            target.innerHTML = html;
            
            // Créer le conteneur de score s'il n'existe pas dans le fichier chargé
            if (!document.getElementById('score-display')) {
                const div = document.createElement('div');
                div.id = 'score-display';
                div.style.margin = "40px 0";
                target.appendChild(div);
            }

            if (window.MathJax) MathJax.typesetPromise([target]);
            document.getElementById('main').scrollTo(0, 0);
        } catch (e) {
            target.innerHTML = `<div class="banner" style="background: #ef4444; border-bottom:none;">
                <h1>Erreur</h1>
                <p>Le module <b>content/${file}.html</b> est introuvable.</p>
            </div>`;
        }
    }

    function loadTraining(subject) {
        const rand = Math.random();
        let file = (rand < 0.25) ? `${subject}_training_pro` : `${subject}_training_v${Math.floor(Math.random() * 3) + 1}`;
        load(file);
    }

    // --- LOGIQUE QCM ---
    function checkAnswer(button, isCorrect) {
        const container = button.parentElement;
        const allButtons = container.querySelectorAll('.opt-btn');
        allButtons.forEach(btn => btn.disabled = true);
        button.classList.add('selected');
        if(isCorrect) button.classList.add('correct');
        else {
            button.classList.add('wrong');
            const correctBtn = Array.from(allButtons).find(b => b.onclick.toString().includes('true'));
            if(correctBtn) correctBtn.classList.add('correct');
        }
    }

    function calculateScore() {
        const score = document.querySelectorAll('.opt-btn.correct.selected').length;
        const total = document.querySelectorAll('.qcm-box').length;
        const scoreDisplay = document.getElementById('score-display');
        
        if(scoreDisplay) {
            scoreDisplay.innerHTML = `
                <div style="background:var(--navy-dark); color:white; padding:40px; border-radius:var(--radius); text-align:center; box-shadow:var(--shadow-lg);">
                    <h2 style="color:var(--gold-btn); margin:0;">RÉSULTAT FINAL</h2>
                    <div style="font-size:4rem; font-weight:800; margin:10px 0;">${score}<span style="font-size:1.5rem; opacity:0.6;">/${total}</span></div>
                    
                    <div class="share-grid-score">
                        <button class="share-pill" onclick="generatePDF()"><i class="fas fa-file-pdf"></i> PDF / Imprimer</button>
                        <button class="share-pill whatsapp" onclick="shareWhatsApp(${score}, ${total})"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                        <button class="share-pill" onclick="shareMail(${score}, ${total})"><i class="fas fa-envelope"></i> Email</button>
                    </div>
                </div>`;
            scoreDisplay.scrollIntoView({ behavior: 'smooth' });
        }
    }

    // --- SORTIES & PARTAGE ---
    function generatePDF() {
        const element = document.getElementById('main');
        const opt = {
            margin: 5,
            filename: 'ElianMaths_Resultats.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    function shareWhatsApp(s, t) {
        const text = `J'ai obtenu ${s}/${t} sur Elian Maths ! 🏆\nLien : ${window.location.href}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function shareMail(s, t) {
        window.location.href = `mailto:?subject=Mes résultats PCSI&body=Score : ${s}/${t} sur Elian Maths.`;
    }

    function toggleCorrection(btn) {
        const corr = btn.nextElementSibling;
        const isHidden = corr.style.display === "none" || corr.style.display === "";
        corr.style.display = isHidden ? "block" : "none";
        btn.innerHTML = isHidden ? '<i class="fas fa-eye-slash"></i> Masquer' : '<i class="fas fa-eye"></i> Corrigé';
    }
</script>

</body>
</html>
